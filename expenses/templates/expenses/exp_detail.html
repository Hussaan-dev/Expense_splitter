<!DOCTYPE html>
<html>
<head>
    <title>Expense Detail</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5">
    <div class="bg-white rounded-lg shadow p-6">
        <h1 class="text-2xl font-bold text-blue-600 mb-2">{{ expense.title }}</h1>
        <p class="text-gray-600 mb-1">Amount: Rs {{ expense.amount }}</p>
        <p class="text-gray-600 mb-4">Paid by: {{ expense.paid_by.username }}</p>
        <hr class="my-4">
        <h3 class="font-semibold mb-3">Splits</h3>
        {% for split in splits %}
            <div class="flex justify-between items-center p-3 mb-2 bg-gray-50 rounded">
                <span>{{ split.user.username }} — Rs {{ split.amount_owed }}</span>
                {% if split.is_paid %}
                    <span class="text-green-500 font-semibold">✅ Paid</span>
                {% else %}
                    <div class="flex items-center gap-2">
                        <span class="text-red-500 font-semibold">❌ Unpaid</span>
                        <a href="{% url 'mark_paid' split.pk %}">
                            <button class="bg-green-500 text-white px-2 py-1 rounded text-sm hover:bg-green-600">
                                Mark Paid
                            </button>
                        </a>
                    </div>
                {% endif %}
            </div>
        {% endfor %}
        <hr class="my-4">
        <form method="post" action="{% url 'del_expense' expense.pk %}">
            {% csrf_token %}
            <button class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600">
                Delete Expense
            </button>
        </form>
        <hr class="my-4">
        <a href="{% url 'group_detail' expense.group.pk %}">
            <button class="bg-gray-400 text-white px-4 py-2 rounded hover:bg-gray-500">
                Back to Group
            </button>
        </a>
    </div>
</body>
</html>
