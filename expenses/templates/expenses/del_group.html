<!DOCTYPE html>
<html>
<head>
    <title>Delete Group</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5">
    <div class="bg-white rounded-lg shadow p-6">
        <h1 class="text-2xl font-bold text-red-500 mb-2">Delete Group</h1>
        <p class="text-gray-600 mb-4">Are you sure you want to delete <strong>{{ group.name }}</strong>? This will delete all expenses and splits too.</p>
        <hr class="my-4">
        <div class="flex justify-between">
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600">
                    Yes, Delete
                </button>
            </form>
            <a href="{% url 'home' %}">
                <button class="bg-gray-400 text-white px-4 py-2 rounded hover:bg-gray-500">
                    Cancel
                </button>
            </a>
        </div>
    </div>
</body>
</html>
