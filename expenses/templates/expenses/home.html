<!DOCTYPE html>
<html>
<head>
    <title>Home - Expense Splitter</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100  p-5">
    <div class="bg-white rounded-lg shadow p-6">
        <h1 class="text-2xl font-bold text-blue-600 mb-4">My Groups</h1>
        <hr class="mb-4">
        {% for group in groups %}
            <a href="{% url 'group_detail' group.pk %}" 
               class="block p-3 mb-2 bg-blue-50 rounded hover:bg-blue-50 text-gray-800">
                {{ group.name }}
            </a>
        {% empty %}
            <p class="text-gray-500">No groups yet.</p>
        {% endfor %}
        <hr class="my-4">
        <div class="flex justify-between">
            <a href="{% url 'create_group' %}">
                <button class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
                    Create Group
                </button>
            </a>
            <form method="post" action="{% url 'logout' %}">
                {% csrf_token %}
                <button class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600">
                    Logout
                </button>
            </form>
        </div>
    </div>
</body>
</html>
